<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kobo Dashboard — Template Editor</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--surf:#141414;--surf2:#1c1c1c;--surf3:#242424;--border:#2a2a2a;--border2:#363636;--text:#e6e6e6;--muted:#7a7a7a;--dim:#444;--accent:#f0f0f0;--r:3px}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Helvetica Neue',Arial,sans-serif;font-size:13px}
.shell{display:flex;height:100vh;overflow:hidden}
.preview{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:20px}
.canvas-wrap{position:relative;background:#fff;box-shadow:0 0 40px rgba(0,0,0,.5);overflow:hidden;flex-shrink:0}
.canvas-wrap .el{cursor:pointer;user-select:none;transition:outline .1s}
.canvas-wrap .el:hover{outline:1px dashed #999}
.canvas-wrap .el.selected{outline:2px solid #5af !important;background:rgba(90,170,255,.08)}
.canvas-wrap .el.clock-space{outline:1px dashed #ccc;background:rgba(200,200,200,.08)}
.sidebar{width:340px;background:var(--surf);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-head{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sidebar-head h2{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);font-weight:400}
.elements{flex:1;overflow-y:auto;padding:8px 0;border-bottom:1px solid var(--border)}
.el-item{display:flex;align-items:center;gap:10px;padding:7px 18px;cursor:pointer;font-size:12px;color:var(--muted);transition:all .1s;border-left:2px solid transparent}
.el-item:hover{background:var(--surf2);color:var(--text)}
.el-item.active{background:var(--surf2);color:var(--accent);border-left-color:var(--accent)}
.el-item .dot{width:6px;height:6px;border-radius:50%;background:var(--dim);flex-shrink:0}
.el-item.active .dot{background:#5af}
.el-item .vis{opacity:.4;margin-left:auto;font-size:10px;cursor:pointer;padding:2px}
.el-item .vis:hover{opacity:1}
.el-item.hidden{opacity:.4}
.props{overflow-y:auto;flex:0 0 auto;max-height:55vh;padding:14px 18px}
.prop-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.prop-row label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;min-width:50px;flex-shrink:0}
.prop-row input,.prop-row select{flex:1;background:var(--surf2);border:1px solid var(--border);color:var(--text);padding:5px 8px;font-size:12px;border-radius:var(--r);outline:none}
.prop-row input:focus,.prop-row select:focus{border-color:var(--accent)}
.prop-row input[type=color]{width:36px;height:28px;padding:2px;flex:0 0 36px;cursor:pointer}
.prop-row input[type=number]{width:60px;flex:0 0 60px}
.prop-row input.wide{flex:2}
.no-sel{padding:30px 18px;color:var(--dim);font-size:12px;text-align:center;font-style:italic}
.btn{padding:6px 16px;background:var(--surf3);border:1px solid var(--border);color:var(--text);border-radius:var(--r);cursor:pointer;font-size:11px;transition:all .1s}
.btn:hover{background:var(--border2)}
.btn-pri{background:var(--accent);color:#000;border-color:var(--accent)}
.btn-pri:hover{background:#fff}
.btn-sm{padding:4px 10px;font-size:10px}
.row-btns{display:flex;gap:6px;padding:0 18px 14px}
.toast{position:fixed;bottom:20px;right:20px;padding:10px 18px;background:#2a2a2a;border:1px solid var(--border2);border-radius:var(--r);font-size:12px;color:var(--text);z-index:999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.toast.ok{border-color:var(--accent);color:var(--accent)}
.toast.err{border-color:#c44;color:#c44}
.el-item .type-badge{font-size:8px;background:var(--surf3);padding:1px 5px;border-radius:2px;color:var(--dim);margin-left:4px}
</style>
</head>
<body>
<div class="shell">
  <div class="preview" id="preview-pane">
    <div class="canvas-wrap" id="canvas-wrap">
    </div>
  </div>
  <div class="sidebar">
    <div class="sidebar-head">
      <h2>Elements</h2>
      <button class="btn btn-pri btn-sm" onclick="saveTemplate()">Save</button>
    </div>
    <div class="elements" id="element-list"></div>
    <div class="props" id="props-panel">
      <div class="no-sel">Select an element to edit</div>
    </div>
    <div class="row-btns">
      <button class="btn btn-sm" onclick="resetTemplate()">Reset</button>
      <button class="btn btn-sm" onclick="refreshPreview()">Refresh Preview</button>
      <button class="btn btn-sm btn-pri" onclick="triggerRefresh()" style="margin-left:auto">⟳ Kobo</button>
      <button class="btn btn-sm" id="wifi-btn-editor" onclick="toggleWifi()">WiFi ◉</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
(function(){
'use strict';

const PREVIEW_W = 600, PREVIEW_H = 800;
let template = null, data = null, selectedId = null;

function toast(msg, type){
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + (type||'') + ' show';
  clearTimeout(t._hide); t._hide = setTimeout(()=>t.className='toast', 2800);
}

const CSS_FONTS = {
  'Sans Regular':      'Liberation Sans, Helvetica, Arial, sans-serif',
  'Sans Bold':         'Liberation Sans, Helvetica, Arial, sans-serif',
  'Sans Italic':       'Liberation Sans, Helvetica, Arial, sans-serif',
  'Sans Bold Italic':  'Liberation Sans, Helvetica, Arial, sans-serif',
  'Serif Regular':     'Liberation Serif, Georgia, Times New Roman, serif',
  'Serif Bold':        'Liberation Serif, Georgia, Times New Roman, serif',
  'Serif Italic':      'Liberation Serif, Georgia, Times New Roman, serif',
  'Serif Bold Italic': 'Liberation Serif, Georgia, Times New Roman, serif',
  'Mono Regular':      'Liberation Mono, Courier New, monospace',
};
const FONT_WEIGHT = {
  'Sans Regular':'400','Sans Bold':'700','Sans Italic':'400','Sans Bold Italic':'700',
  'Serif Regular':'400','Serif Bold':'700','Serif Italic':'400','Serif Bold Italic':'700',
  'Mono Regular':'400',
};
const FONT_STYLE = {
  'Sans Regular':'normal','Sans Bold':'normal','Sans Italic':'italic','Sans Bold Italic':'italic',
  'Serif Regular':'normal','Serif Bold':'normal','Serif Italic':'italic','Serif Bold Italic':'italic',
  'Mono Regular':'normal',
};
const FONT_NAMES = ['Sans','Serif','Mono'];
const STYLE_NAMES = ['Regular','Bold','Italic','Bold Italic'];
const ALIGN_NAMES = ['left','center','right'];

const DAYS = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
const MONTHS = ['','January','February','March','April','May','June','July','August','September','October','November','December'];

function resolveVars(text, data){
  const now = new Date();
  const dayName = DAYS[now.getDay()] || '';
  const dateStr = (MONTHS[now.getMonth()+1]||'') + ' ' + now.getDate() + ', ' + now.getFullYear();
  const quote = data.quote || {};
  const subs = {
    '{day_name}': dayName, '{date}': dateStr, '{battery}': '86%',
    '{quote_text}': quote.text || '', '{quote_author}': quote.author || '',
    '{updated_at}': data.updated_at || '',
  };
  let r = text;
  for (const [k,v] of Object.entries(subs)) r = r.replaceAll(k, v);
  return r;
}

function wrapText(text, maxChars){
  if (maxChars <= 0) return [text];
  const words = text.split(' ');
  if (!words.length) return [''];
  const lines = [];
  let cur = words[0];
  for (let i = 1; i < words.length; i++){
    const test = cur + ' ' + words[i];
    if (test.length <= maxChars) { cur = test; }
    else { lines.push(cur); cur = words[i]; }
  }
  lines.push(cur);
  return lines;
}

function buildDataVals(data){
  const events = data.events || [];
  const todos = data.todos || [];
  const quote = data.quote || {};
  const evLines = events.slice(0,3).map(e => (e.time||'') + '  ' + (e.title||''));
  const tdLines = todos.slice(0,3).map(t => (t.done?'[x]':'[ ]') + '  ' + (t.text||''));
  return { events: evLines, todos: tdLines, quoteText: quote.text||'', quoteAuthor: quote.author||'' };
}

function fitScale(){
  const pane = document.getElementById('preview-pane');
  const wrap = document.getElementById('canvas-wrap');
  const pw = pane.clientWidth - 40, ph = pane.clientHeight - 40;
  const scale = Math.min(pw / PREVIEW_W, ph / PREVIEW_H, 1.2);
  const w = Math.round(PREVIEW_W * scale), h = Math.round(PREVIEW_H * scale);
  wrap.style.width = w + 'px'; wrap.style.height = h + 'px';
  wrap.style.transform = 'none';
  return scale;
}

function renderPreview(){
  const wrap = document.getElementById('canvas-wrap');
  wrap.innerHTML = '';
  const scale = fitScale();
  const bg = data && data.background;
  if (bg){
    const img = document.createElement('img');
    img.src = bg + '?t=' + Date.now();
    img.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;object-fit:fill;pointer-events:none';
    wrap.appendChild(img);
  }
  const vals = buildDataVals(data);
  (template.elements || []).forEach((el, idx) => {
    const div = document.createElement('div');
    div.className = 'el';
    if (el.id === selectedId) div.classList.add('selected');
    div.dataset.idx = idx;
    div.style.position = 'absolute';
    div.style.left = (el.x * scale) + 'px';
    div.style.top = (el.y * scale) + 'px';
    div.style.fontSize = (el.size * scale) + 'px';
    div.style.color = el.color || '#000';
    div.style.transform = 'scale(' + scale + ')';
    div.style.transformOrigin = '0 0';

    if (!el.visible){ div.style.display = 'none'; }

    if (el.type === 'clock_space'){
      div.classList.add('clock-space');
      div.style.width = ((el.width||200) * scale) + 'px';
      div.style.height = ((el.height||100) * scale) + 'px';
      div.style.transform = 'none';
      div.textContent = '⌛ Clock Area';
      div.style.cssText += ';display:flex;align-items:center;justify-content:center;font-size:11px;color:#999';
      wrap.appendChild(div);
      return;
    }

    if (el.type === 'text'){
      let text = resolveVars(el.text || '', data);
      const prefix = el.prefix || '';
      if (prefix) text = prefix + text;
      if (!text) return;

      const maxChars = el.wrap_width > 0 ? Math.floor(el.wrap_width / (el.size * 0.6)) : 0;
      const lines = el.wrap_width > 0 ? wrapText(text, maxChars) : text.split('\n');

      const container = document.createElement('div');
      container.style.position = 'absolute';
      container.style.left = (el.x * scale) + 'px';
      container.style.top = (el.y * scale) + 'px';
      container.style.transform = 'scale(' + scale + ')';
      container.style.transformOrigin = '0 0';

      const fontKey = (el.font||'Sans') + ' ' + (el.style||'Regular');
      lines.forEach((line, li) => {
        const span = document.createElement('div');
        span.textContent = line;
        span.style.fontSize = (el.size) + 'px';
        span.style.fontFamily = CSS_FONTS[fontKey] || 'sans-serif';
        span.style.fontWeight = FONT_WEIGHT[fontKey] || '400';
        span.style.fontStyle = FONT_STYLE[fontKey] || 'normal';
        span.style.color = el.color || '#000';
        span.style.whiteSpace = 'nowrap';
        span.style.lineHeight = '1.3';

        if (el.align === 'right') span.style.textAlign = 'right';
        else if (el.align === 'center') span.style.textAlign = 'center';

        if (li > 0) span.style.marginTop = '2px';

        container.appendChild(span);
      });

      // For right/center align, compute width of widest line
      if (el.align === 'right' || el.align === 'center'){
        let maxW = 0;
        container.querySelectorAll('div').forEach(s => {
          const r = s.getBoundingClientRect();
          // approximate with text length
          const w = s.textContent.length * el.size * 0.6;
          if (w > maxW) maxW = w;
        });
        if (el.align === 'right') container.style.right = 0 + 'px';
        else if (el.align === 'center') container.style.left = ((el.x - maxW/2) * scale) + 'px';
      }

      // Click to select
      container.onclick = (e) => { e.stopPropagation(); selectElement(el.id); };
      if (el.id === selectedId) {
        const selDiv = document.createElement('div');
        selDiv.style.cssText = 'position:absolute;top:-2px;left:-2px;right:-2px;bottom:-2px;outline:2px solid #5af;background:rgba(90,170,255,.05);pointer-events:none';
        container.appendChild(selDiv);
      }

      wrap.appendChild(container);
      return;
    }

    if (el.type === 'list'){
      const items = data[el.data_source] || [];
      const maxN = el.max_items || 99;
      const lineH = el.line_height || 18;
      const tmpl = el.item_template || '{text}';

      if (!items.length && el.empty_text){
        const span = document.createElement('div');
        span.textContent = el.empty_text;
        span.style.cssText = 'position:absolute;left:0;top:0;font-size:'+el.size+'px;color:'+(el.color||'#000')+';font-family:'+(CSS_FONTS[el.font+' '+el.style]||'sans-serif')+'';
        div.appendChild(span);
        wrap.appendChild(div);
        return;
      }

      const container = document.createElement('div');
      container.style.position = 'absolute';
      container.style.left = (el.x * scale) + 'px';
      container.style.top = (el.y * scale) + 'px';
      container.style.transform = 'scale(' + scale + ')';
      container.style.transformOrigin = '0 0';

      items.slice(0, maxN).forEach((item, i) => {
        let line = tmpl;
        for (const [k,v] of Object.entries(item)){
          if (typeof v === 'string') line = line.replaceAll('{'+k+'}', v);
          else line = line.replaceAll('{'+k+'}', String(v));
        }
        if (el.data_source === 'todos'){
          line = line.replace('{mark}', item.done ? '[x]' : '[ ]');
        }

        const span = document.createElement('div');
        span.textContent = line;
        span.style.fontSize = (el.size) + 'px';
        span.style.fontFamily = (CSS_FONTS[el.font+' '+el.style] || 'sans-serif');
        span.style.color = el.color || '#000';
        span.style.whiteSpace = 'nowrap';
        span.style.lineHeight = '1.3';
        if (i > 0) span.style.marginTop = (lineH - el.size - 2) + 'px';
        container.appendChild(span);
      });

      container.onclick = (e) => { e.stopPropagation(); selectElement(el.id); };
      if (el.id === selectedId) {
        const selDiv = document.createElement('div');
        selDiv.style.cssText = 'position:absolute;top:-2px;left:-2px;right:-2px;bottom:-2px;outline:2px solid #5af;background:rgba(90,170,255,.05);pointer-events:none';
        container.appendChild(selDiv);
      }

      wrap.appendChild(container);
    }
  });
}

function renderElementList(){
  const list = document.getElementById('element-list');
  list.innerHTML = '';
  (template.elements || []).forEach((el, i) => {
    const div = document.createElement('div');
    div.className = 'el-item' + (el.id === selectedId ? ' active' : '') + (el.visible === false ? ' hidden' : '');
    div.dataset.id = el.id;

    const dot = document.createElement('span');
    dot.className = 'dot';
    div.appendChild(dot);

    const label = document.createElement('span');
    label.textContent = el.label || el.id;
    div.appendChild(label);

    const badge = document.createElement('span');
    badge.className = 'type-badge';
    badge.textContent = el.type;
    div.appendChild(badge);

    const vis = document.createElement('span');
    vis.className = 'vis';
    vis.textContent = el.visible === false ? '⊙' : '◉';
    vis.title = 'Toggle visibility';
    vis.onclick = (e) => { e.stopPropagation(); toggleVis(el.id); };
    div.appendChild(vis);

    div.onclick = () => selectElement(el.id);
    list.appendChild(div);
  });
}

function renderProps(){
  const panel = document.getElementById('props-panel');
  const el = (template.elements || []).find(e => e.id === selectedId);
  if (!el){
    panel.innerHTML = '<div class="no-sel">Select an element to edit</div>';
    return;
  }

  const labels = {
    font: 'Font', style: 'Style', size: 'Size', x: 'X', y: 'Y',
    color: 'Color', align: 'Align', text: 'Text', visible: 'Visible',
    wrap_width: 'Wrap W', line_height: 'Line H', max_items: 'Max',
    data_source: 'Source', item_template: 'Template', prefix: 'Prefix',
    width: 'Width', height: 'Height', empty_text: 'Empty Text',
  };

  let html = '';
  const fields = ['text','font','style','size','x','y','color','align','wrap_width',
                  'prefix','line_height','max_items','data_source','item_template',
                  'width','height','empty_text'];
  fields.forEach(f => {
    if (el[f] === undefined && f !== 'visible') return;
    if (el.type === 'clock_space' && ['text','font','style','color','align','wrap_width','prefix','line_height','max_items','data_source','item_template','empty_text'].includes(f)) return;
    if (el.type !== 'clock_space' && ['width','height'].includes(f)) return;
    if (el.type !== 'list' && ['line_height','max_items','data_source','item_template','empty_text'].includes(f)) return;
    if (el.type !== 'text' && ['text','wrap_width','prefix','font'].includes(f) && el.type === 'list') return;
    if (el.type === 'list' && f === 'text') return;

    const val = el[f] !== undefined ? el[f] : '';
    const label = labels[f] || f;

    if (f === 'color'){
      html += '<div class="prop-row"><label>Color</label><input type="color" value="' + val + '" onchange="updateProp(\''+f+'\',this.value)"><input type="text" value="' + val + '" onchange="updateProp(\''+f+'\',this.value)" style="flex:1;min-width:80px"></div>';
    } else if (f === 'font'){
      html += '<div class="prop-row"><label>Font</label><select onchange="updateProp(\'font\',this.value)">' +
        FONT_NAMES.map(n => '<option'+(val===n?' selected':'')+'>'+n+'</option>').join('') + '</select></div>';
    } else if (f === 'style'){
      html += '<div class="prop-row"><label>Style</label><select onchange="updateProp(\'style\',this.value)">' +
        STYLE_NAMES.map(n => '<option'+(val===n?' selected':'')+'>'+n+'</option>').join('') + '</select></div>';
    } else if (f === 'align'){
      html += '<div class="prop-row"><label>Align</label><select onchange="updateProp(\'align\',this.value)">' +
        ALIGN_NAMES.map(n => '<option'+(val===n?' selected':'')+'>'+n+'</option>').join('') + '</select></div>';
    } else if (f === 'visible'){
      html += '<div class="prop-row"><label>Visible</label><input type="checkbox" '+(val!==false?'checked':'')+' onchange="updateProp(\'visible\',this.checked)" style="width:18px;height:18px;flex:0"></div>';
    } else if (typeof val === 'number' || ['x','y','size','wrap_width','line_height','max_items','width','height'].includes(f)){
      html += '<div class="prop-row"><label>'+label+'</label><input type="number" value="'+val+'" onchange="updateProp(\''+f+'\',parseFloat(this.value)||0)" class="'+(f==='wrap_width'?'wide':'')+'"></div>';
    } else if (f === 'text' || f === 'item_template' || f === 'empty_text' || f === 'prefix'){
      html += '<div class="prop-row"><label>'+label+'</label><input type="text" value="' + htmlEscape(String(val)) + '" onchange="updateProp(\''+f+'\',this.value)" class="wide" spellcheck="false"></div>';
    } else {
      html += '<div class="prop-row"><label>'+label+'</label><input type="text" value="' + htmlEscape(String(val)) + '" onchange="updateProp(\''+f+'\',this.value)"></div>';
    }
  });
  panel.innerHTML = html;
}

function htmlEscape(s){ return s.replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function selectElement(id){
  selectedId = id;
  renderElementList();
  renderProps();
  renderPreview();
}

function toggleVis(id){
  const el = template.elements.find(e => e.id === id);
  if (el) { el.visible = el.visible === false ? true : false; }
  renderElementList();
  renderPreview();
}

window.updateProp = function(field, value){
  const el = template.elements.find(e => e.id === selectedId);
  if (el) { el[field] = value; }
  renderElementList();
  renderPreview();
};

function loadData(cb){
  fetch('/dashboard.json').then(r=>r.json()).then(d => { data = d; cb(); }).catch(() => { data = {events:[],todos:[],quote:{}}; cb(); });
}

function loadTemplate(cb){
  fetch('/api/template').then(r=>r.json()).then(t => { template = t; cb(); }).catch(() => {
    toast('Failed to load template','err'); cb();
  });
}

function refreshPreview(){
  loadData(() => renderPreview());
}

function saveTemplate(){
  fetch('/api/template', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(template)
  }).then(r => {
    if (r.ok) { toast('Template saved','ok'); }
    else { toast('Save failed','err'); }
  }).catch(() => toast('Save failed','err'));
}

function resetTemplate(){
  if (!confirm('Reset template to defaults?')) return;
  fetch('/api/template/reset', {method:'POST'}).then(r=>r.json()).then(t => {
    template = t; selectedId = null;
    renderElementList(); renderProps(); renderPreview();
    toast('Template reset','ok');
  }).catch(() => toast('Reset failed','err'));
}

// Init
loadData(() => {
  loadTemplate(() => {
    // Select first visible element
    const first = (template.elements||[]).find(e => e.visible !== false && e.type !== 'clock_space');
    if (first) selectedId = first.id;
    renderElementList();
    renderProps();
    renderPreview();
  });
});

window.triggerRefresh = function(){
  fetch('/api/refresh',{method:'POST'}).then(r=>r.json()).then(d=>{
    if(d.ok) toast('Refresh sent (Kobo picks up within 60s)','ok');
    else toast('Refresh failed','err');
  }).catch(()=>toast('Network error','err'));
};

window.toggleWifi = function(){
  fetch('/api/poll').then(r=>r.json()).then(p=>{
    const s = p.wifi ? 'off' : 'on';
    fetch('/api/wifi/'+s,{method:'POST'}).then(r=>r.json()).then(d=>{
      if(d.ok){
        const btn = document.getElementById('wifi-btn-editor');
        btn.textContent = d.wifi ? 'WiFi ◉' : 'WiFi ⊙';
        toast('WiFi '+(d.wifi?'enabled':'disabled'),'ok');
      }
    });
  }).catch(()=>toast('Network error','err'));
};
fetch('/api/poll').then(r=>r.json()).then(p=>{
  document.getElementById('wifi-btn-editor').textContent = p.wifi ? 'WiFi ◉' : 'WiFi ⊙';
});

window.addEventListener('resize', () => renderPreview());

})();
</script>
</body>
</html>
